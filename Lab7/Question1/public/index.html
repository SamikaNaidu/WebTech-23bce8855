<!DOCTYPE html>
<html>

<head>
    <title>Student Notes Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Student Notes Manager</h1>

<h2>Add Note</h2>

<input id="title" placeholder="Title">
<input id="subject" placeholder="Subject">
<textarea id="description" placeholder="Description"></textarea>

<button class="add-btn" onclick="addNote()">Add Note</button>

<hr>

<h2>All Notes</h2>

<div id="notes"></div>

</div>

<script>

function addNote(){

const note = {
title: document.getElementById("title").value,
subject: document.getElementById("subject").value,
description: document.getElementById("description").value
};

fetch("/notes",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(note)
})
.then(()=>loadNotes());

}

function loadNotes(){

fetch("/notes")
.then(res=>res.json())
.then(data=>{

const notesDiv=document.getElementById("notes");
notesDiv.innerHTML="";

data.forEach(note=>{

notesDiv.innerHTML += `
<div class="note">
<h3>${note.title}</h3>
<p><b>Subject:</b> ${note.subject}</p>
<p>${note.description}</p>

<button class="delete-btn" onclick="deleteNote('${note._id}')">Delete</button>
<button class="edit-btn" onclick="editNote('${note._id}')">Edit</button>

</div>
`;

});

});

}

function deleteNote(id){

fetch("/notes/"+id,{
method:"DELETE"
})
.then(()=>loadNotes());

}

function editNote(id){

const title = prompt("New title");
const desc = prompt("New description");

fetch("/notes/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
title:title,
description:desc
})
})
.then(()=>loadNotes());

}

loadNotes();

</script>

</body>

</html>
