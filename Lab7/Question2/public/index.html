<!DOCTYPE html>
<html>

<head>
<title>Online Book Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Online Book Finder</h1>

<input id="searchTitle" placeholder="Search by title">
<button onclick="searchBook()">Search</button>

<br><br>

<input id="category" placeholder="Filter by category">
<button onclick="filterCategory()">Filter</button>

<br><br>

<button onclick="sortPrice()">Sort by Price</button>
<button onclick="sortRating()">Sort by Rating</button>
<button onclick="topBooks()">Top Rated</button>

<hr>

<h2>Books</h2>

<div id="books"></div>

<button onclick="nextPage()">Load More</button>

</div>

<script>

let page=1;

function displayBooks(data){

const booksDiv=document.getElementById("books");
booksDiv.innerHTML="";

data.forEach(book=>{

booksDiv.innerHTML+=`
<div class="book">
<h3>${book.title}</h3>
<p><b>Author:</b> ${book.author}</p>
<p><b>Category:</b> ${book.category}</p>
<p><b>Price:</b> ₹${book.price}</p>
<p><b>Rating:</b> ${book.rating}</p>
</div>
`;

});

}


// SEARCH
function searchBook(){

const title=document.getElementById("searchTitle").value;

fetch("/books/search?title="+title)
.then(res=>res.json())
.then(displayBooks);

}


// FILTER
function filterCategory(){

const category=document.getElementById("category").value;

fetch("/books/category/"+category)
.then(res=>res.json())
.then(displayBooks);

}


// SORT PRICE
function sortPrice(){

fetch("/books/sort/price")
.then(res=>res.json())
.then(displayBooks);

}


// SORT RATING
function sortRating(){

fetch("/books/sort/rating")
.then(res=>res.json())
.then(displayBooks);

}


// TOP BOOKS
function topBooks(){

fetch("/books/top")
.then(res=>res.json())
.then(displayBooks);

}


// PAGINATION
function nextPage(){

page++;

fetch("/books?page="+page)
.then(res=>res.json())
.then(displayBooks);

}


// LOAD FIRST PAGE
fetch("/books?page=1")
.then(res=>res.json())
.then(displayBooks);

</script>

</body>

</html>
